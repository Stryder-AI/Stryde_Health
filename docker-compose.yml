version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stryde_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stryde
      POSTGRES_PASSWORD: stryde_pass
      POSTGRES_DB: stryde_health
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stryde_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@strydehealth.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
